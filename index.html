<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
        <link rel="stylesheet" href="./assets/styles.css">
        <title>Frontend Mentor | Stats preview card component</title>
    </head>
    <body class="o-flex-center">
        <main class="o-container o-flex-center">
            <div class="og-stats-card">
                <article class="m-stats-card">
                    <div class="m-stats-card__header"></div>
                    <div class="m-stats-card__body">
                        <h5 class="m-stats-card__title">Get <span class="u-text-bold">insights</span> that help your
                            business grow.</h5>
                        <p class="m-stats-card__description">
                            Discover the benefits of data analytics and make better decisions regarding revenue,
                            customer experience, and overall efficiency.
                        </p>
                        <div class="m-stats">
                            <div class="m-label-stats">
                                <div class="m-label-stats__title">10k+</div>
                                <div class="m-label-stats__text">companies</div>
                            </div>
                            <div class="m-label-stats">
                                <div class="m-label-stats__title">314</div>
                                <div class="m-label-stats__text">templates</div>
                            </div>
                            <div class="m-label-stats">
                                <div class="m-label-stats__title">12m+</div>
                                <div class="m-label-stats__text">queries</div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>
    </body>
</html>
